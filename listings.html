<!DOCTYPE html>
<html>
<head>
  <title>Listings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>All Items</h1>

<input type="text" id="search" placeholder="Search items..." onkeyup="searchItems()">

<h2>Lost Items</h2>
<div id="lostItems"></div>

<h2>Found Items</h2>
<div id="foundItems"></div>

<script>
let items = JSON.parse(localStorage.getItem("items")) || [];

function displayItems(data) {
  document.getElementById("lostItems").innerHTML = "";
  document.getElementById("foundItems").innerHTML = "";

  data.forEach(item => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${item.name}</h3>
      <p>${item.description}</p>
      <p><b>Location:</b> ${item.location}</p>
      <p><b>Contact:</b> ${item.contact}</p>
    `;

    if (item.type === "lost") {
      document.getElementById("lostItems").appendChild(div);
    } else {
      document.getElementById("foundItems").appendChild(div);
    }
  });
}

function searchItems() {
  let query = document.getElementById("search").value.toLowerCase();

  let filtered = items.filter(item =>
    item.name.toLowerCase().includes(query)
  );

  displayItems(filtered);
}

displayItems(items);
</script>

</body>
</html>
